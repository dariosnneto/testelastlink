#version: "3.9"

services:
  mock-payments-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mock-payments-api
    ports:
      - "3000:3000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Webhook__Url=http://webhook-sink:4000/webhook
    depends_on:
      webhook-sink:
        condition: service_healthy
    restart: unless-stopped

  # Webhook sink with failure simulation support.
  #
  # Control endpoint (POST http://localhost:4000/control):
  #   {"mode": "ok"}       — default, returns HTTP 200
  #   {"mode": "500"}      — simulates server error (HTTP 500)
  #   {"mode": "timeout"}  — simulates timeout (sleeps 10s before responding)
  #
  # Webhook endpoint: POST http://localhost:4000/webhook
  webhook-sink:
    image: python:3.12-slim
    container_name: webhook-sink
    command: |
      python -c "
      import http.server, json, time, threading

      state = {'mode': 'ok'}
      lock = threading.Lock()

      class Handler(http.server.BaseHTTPRequestHandler):
          def do_POST(self):
              length = int(self.headers.get('Content-Length', 0))
              body = self.rfile.read(length).decode()
              if self.path == '/control':
                  data = json.loads(body) if body else {}
                  with lock:
                      state['mode'] = data.get('mode', 'ok')
                  print(f'[webhook-sink] mode set to: {state[\"mode\"]}', flush=True)
                  self.send_response(200)
                  self.end_headers()
                  self.wfile.write(b'{\"ok\":true}')
                  return
              with lock:
                  mode = state['mode']
              print(f'[webhook-sink] received ({mode}): {body}', flush=True)
              if mode == 'timeout':
                  time.sleep(10)
              if mode == '500':
                  self.send_response(500)
                  self.end_headers()
                  self.wfile.write(b'{\"error\":\"simulated failure\"}')
              else:
                  self.send_response(200)
                  self.end_headers()
                  self.wfile.write(b'{\"received\":true}')
          def log_message(self, *args):
              pass

      print('[webhook-sink] listening on :4000', flush=True)
      http.server.HTTPServer(('0.0.0.0', 4000), Handler).serve_forever()
      "
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/webhook', data=b'{}')"]
      interval: 3s
      timeout: 3s
      retries: 10
